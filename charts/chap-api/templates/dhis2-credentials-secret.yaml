{{- if .Values.dhis2.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chap-api.fullname" . }}-dhis2
  labels:
    {{- include "chap-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  hostname: {{ .Values.dhis2.hostname | quote }}
  username: {{ .Values.dhis2.username | quote }}
  password: {{ .Values.dhis2.password | quote }}
{{- end }}
