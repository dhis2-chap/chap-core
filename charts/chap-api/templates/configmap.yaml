apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chap-api.fullname" . }}
  labels:
    {{- include "chap-api.labels" . | nindent 4 }}
data:
  POSTGRES_HOST: {{ required "postgres.host is required" .Values.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.postgres.port | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | default "chap_core" | quote }}
  REDIS_HOST: {{ required "valkey.host is required" .Values.valkey.host | quote }}
  REDIS_PORT: {{ .Values.valkey.port | quote }}
