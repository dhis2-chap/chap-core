{{- if .Values.dhis2.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "chap-api.fullname" . }}-register-{{ .Release.Revision }}
  labels:
    {{- include "chap-api.labels" . | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: configure-route
          image: curlimages/curl:8.11.1
          envFrom:
            - secretRef:
                name: {{ include "chap-api.fullname" . }}-dhis2
          env:
            - name: CHAP_URL
              value: "http://{{ include "chap-api.fullname" . }}.{{ .Release.Namespace }}.svc:{{ .Values.service.port }}"
          command:
            - /bin/sh
            - -c
            - |
              PAYLOAD=$(printf '%s' '{
                "name": "Chap Modeling App",
                "code": "chap",
                "url": "'"${CHAP_URL}"'/**",
                "authorities": ["F_CHAP_MODELING_APP"],
                "headers": {"Content-Type": "application/json"},
                "responseTimeoutSeconds": 30
              }')
              MAX_ATTEMPTS=10
              DELAY=10
              i=0
              while [ $i -lt $MAX_ATTEMPTS ]; do
                RESPONSE=$(curl -s -w "\n%{http_code}" \
                  -X POST \
                  -H "Content-Type: application/json" \
                  -u "${username}:${password}" \
                  --connect-timeout 10 \
                  --max-time 30 \
                  --data "$PAYLOAD" \
                  "https://${hostname}/api/42/routes")
                HTTP_CODE=$(printf '%s' "$RESPONSE" | tail -1)
                BODY=$(printf '%s' "$RESPONSE" | head -n -1)
                # TODO: Support other DHIS2 versions than 42
                echo "POST https://${hostname}/api/42/routes -> HTTP $HTTP_CODE: $BODY"
                if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                  echo "Route registered: HTTP $HTTP_CODE"
                  exit 0
                elif [ "$HTTP_CODE" = "409" ]; then
                  echo "Route already exists (HTTP 409), nothing to do"
                  exit 0
                fi
                i=$((i + 1))
                echo "Attempt $i/$MAX_ATTEMPTS: retrying in ${DELAY}s..."
                sleep $DELAY
              done
              echo "Failed after $MAX_ATTEMPTS attempts"
              exit 1
{{- end }}
