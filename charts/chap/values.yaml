# Default values for CHAP.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

api:
  image:
    repository: ghcr.io/dhis2-chap/chap-core
    pullPolicy: IfNotPresent
    tag: ""
  replicaCount: 1
  command:
    - uvicorn
    - chap_core.rest_api.v1.rest_api:app
    - --host
    - 0.0.0.0
    - --port
    - "8000"
  resources: {}
  volumeMounts: []
  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: ""
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
  nodeSelector: {}
  tolerations: []
  affinity: {}

worker:
  image:
    repository: ghcr.io/dhis2-chap/chap-worker-with-inla
    pullPolicy: IfNotPresent
    tag: ""
  replicaCount: 1
  command:
    - celery
    - -A
    - chap_core.rest_api.celery_tasks
    - worker
    - --loglevel=info
  resources: {}
  volumeMounts: []
  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: ""
  livenessProbe:
    exec:
      command:
        - celery
        - -A
        - chap_core.rest_api.celery_tasks
        - inspect
        - ping
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    exec:
      command:
        - celery
        - -A
        - chap_core.rest_api.celery_tasks
        - inspect
        - ping
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
  nodeSelector: {}
  tolerations: []
  affinity: {}

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
nameOverride: "chap"
fullnameOverride: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  readOnlyRootFilesystem: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
      - ALL

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  port: 8000

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

valkey:
  auth:
    enabled: true
    aclUsers:
      default:
        password: changeme
        permissions: "~* &* +@all"
  persistence:
    enabled: true
    size: 8Gi

valkeyConnection:
  existingSecret: ""
  secretKeys:
    password: default-password
  host: chap-valkey
  port: 6379
  password: ""

postgresql:
  managed:
    enabled: true
    instances: 1
    storageSize: 10Gi
    version: "17"
    database: chap_core
    monitoring: false
  external:
    host: ""
    port: 5432
    database: chap_core
    user: postgres
    password: ""
  existingSecret: ""
  secretKeys:
    username: username
    password: password
