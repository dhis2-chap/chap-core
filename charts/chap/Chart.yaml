apiVersion: v2
name: chap
description: CHAP (Climate Health Analysis Platform) - Umbrella Chart
type: application
version: 0.2.0
appVersion: "1.0.0"

dependencies:
  - name: chap-db
    version: 0.1.0
    repository: "file://../chap-db"
    condition: chap-db.enabled
  - name: chap-valkey
    version: 0.1.0
    repository: "file://../chap-valkey"
    condition: chap-valkey.enabled
  - name: chap-api
    version: 0.1.0
    repository: "file://../chap-api"
    condition: chap-api.enabled
  - name: chap-worker
    version: 0.1.0
    repository: "file://../chap-worker"
    condition: chap-worker.enabled

annotations:
  category: Application
