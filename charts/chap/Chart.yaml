apiVersion: v2
name: chap
description: CHAP (Climate Health Analysis Platform) - Umbrella Chart
type: application
version: 0.3.1
appVersion: "1.0.0"

dependencies:
  - name: chap-db
    version: 0.1.3
    repository: "file://../chap-db"
    condition: chap-db.enabled
  - name: valkey
    version: 0.9.2
    repository: "https://valkey.io/valkey-helm"
    condition: valkey.enabled
  - name: chap-api
    version: 0.1.6
    repository: "file://../chap-api"
    condition: chap-api.enabled
  - name: chap-worker
    version: 0.1.1
    repository: "file://../chap-worker"
    condition: chap-worker.enabled

annotations:
  category: Application
