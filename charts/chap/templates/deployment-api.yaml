apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chap.fullname" . }}-api
  labels:
    {{- include "chap.labels" . | nindent 4 }}
    component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chap.selectorLabels" . | nindent 6 }}
      component: api
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "chap.labels" . | nindent 8 }}
        component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "chap.fullname" . }}-api
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "chap.fullname" . }}-api
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            {{- toYaml .Values.api.command | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          {{- with .Values.api.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chap.fullname" . }}
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chap.fullname" . }}
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.valkeyConnection.existingSecret }}
                  name: {{ .Values.valkeyConnection.existingSecret }}
                  key: {{ .Values.valkeyConnection.secretKeys.password }}
                  {{- else }}
                  name: {{ include "chap.fullname" . }}
                  key: REDIS_PASSWORD
                  {{- end }}
            - name: CELERY_BROKER
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: POSTGRES_USER
              {{- if .Values.postgresql.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.secretKeys.username }}
              {{- else if .Values.postgresql.managed.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "chap.fullname" . }}-postgres-app
                  key: username
              {{- else }}
              value: postgres
              {{- end }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.postgresql.existingSecret }}
                  name: {{ .Values.postgresql.existingSecret }}
                  key: {{ .Values.postgresql.secretKeys.password }}
                  {{- else if .Values.postgresql.managed.enabled }}
                  name: {{ include "chap.fullname" . }}-postgres-app
                  key: password
                  {{- else }}
                  name: {{ include "chap.fullname" . }}
                  key: POSTGRES_PASSWORD
                  {{- end }}
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chap.fullname" . }}
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chap.fullname" . }}
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chap.fullname" . }}
                  key: POSTGRES_DB
            - name: CHAP_DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: CHAP_LOGS_DIR
              value: /data/logs
          envFrom:
            - configMapRef:
                name: {{ include "chap.fullname" . }}
          volumeMounts:
            - name: tmpfs
              mountPath: /tmp
            - name: logs
              mountPath: /data/logs
          {{- with .Values.api.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tmpfs
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        - name: logs
          emptyDir: {}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
