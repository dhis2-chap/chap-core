apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chap-worker.fullname" . }}
  labels:
    {{- include "chap-worker.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chap-worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "chap-worker.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "chap-worker.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "chap-worker.fullname" . }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.command | nindent 12 }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: IS_IN_DOCKER
              value: "1"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chap-worker.fullname" . }}
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chap-worker.fullname" . }}
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "chap-worker.valkey.secretName" . }}
                  key: {{ .Values.valkey.secretKeys.password }}
            - name: CELERY_BROKER
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: RENV_PATHS_ROOT
              value: /data/renv
            - name: UV_CACHE_DIR
              value: /data/uv
            - name: CHAP_LOGS_DIR
              value: /data/logs
            - name: CHAP_RUNS_DIR
              value: /data/runs
            - name: PYTENSOR_FLAGS
              value: "base_compiledir=/data/pytensor"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "chap-worker.postgres.secretName" . }}
                  key: {{ .Values.postgres.secretKeys.username }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "chap-worker.postgres.secretName" . }}
                  key: {{ .Values.postgres.secretKeys.password }}
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chap-worker.fullname" . }}
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chap-worker.fullname" . }}
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "chap-worker.fullname" . }}
                  key: POSTGRES_DB
            - name: CHAP_DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
          envFrom:
            - configMapRef:
                name: {{ include "chap-worker.fullname" . }}
          volumeMounts:
            - name: tmpfs
              mountPath: /tmp
            - name: runs
              mountPath: /data/runs
            - name: renv
              mountPath: /data/renv
            - name: uv
              mountPath: /data/uv
            - name: logs
              mountPath: /data/logs
            - name: pytensor
              mountPath: /data/pytensor
            {{- with .Values.volumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmpfs
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        - name: runs
          emptyDir: {}
        - name: renv
          emptyDir: {}
        - name: uv
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: pytensor
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
