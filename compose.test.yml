services:
  chap:
    build:
        context: .
        dockerfile: Dockerfile.test
    init: true
    # multine command
    depends_on:
        -  worker
    # for now some of the tests uses hardocded names so we need to set the container name
    container_name: chap_test
    environment:
      - HAS_WORKER=1
    command: /app/.venv/bin/pytest /app/tests

