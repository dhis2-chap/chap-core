version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # v19 was published with a broken bundle (missing @actions/core) and the
      # release was pulled, but the floating tag still resolves. Stay on v18.
      - dependency-name: "gabrielfalcao/pyenv-action"
        versions: ["19"]
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
