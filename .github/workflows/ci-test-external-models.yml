# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Test-all (docker, external models, etc)

on:
  push:
    branches: ["master", "dev"]
  pull_request:
    branches: ["master", "dev"]

permissions:
  contents: read
  packages: read

jobs:
  test-all:
    env:
      REDIS_HOST: localhost

    runs-on: ubuntu-latest
    services:
      redis:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    #container:
    #    image: ubuntu:latest
    #    options: --user root
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v7

      #- name: Set up Docker Buildx
      #  uses: docker/setup-buildx-action@v3

      #- name: Log in to GitHub Container Registry
      #  uses: docker/login-action@v3
      #  with:
      #    registry: ghcr.io
      #    username: ${{ github.actor }}
      #    password: ${{ secrets.GITHUB_TOKEN }}

      #- name: Pull worker image from cache
      #  run: |
      #    docker pull ghcr.io/dhis2-chap/chap-worker-with-inla@sha256:634bb3e61e66f9c1c2d499c495d294cd5f287078ae7b54629114066f8ec75aab

      # - name: Free Disk Space (Ubuntu)
      #   uses: jlumbroso/free-disk-space@main
      #   with:
      #     # this might remove tools that are actually needed,
      #     # when set to "true" but frees about 6 GB
      #     tool-cache: false
      #
      #     # all of these default to true, but feel free to set to
      #     # "false" if necessary for your workflow
      #     android: true
      #     dotnet: true
      #     haskell: true
      #     large-packages: false
      #     swap-storage: true
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Set up Python ${{ matrix.python-version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libbz2-dev liblzma-dev
          uv python install ${{ matrix.python-version }}
      - name: Install the project
        run: uv sync --dev
      - name: Install pyenv
        uses: gabrielfalcao/pyenv-action@v18
        with:
          default: "3.13"
          command: ""
      - name: Run
        run: |
          cp .env.example .env
          # The placeholder REDIS_PASSWORD from .env.example gets loaded via
          # load_dotenv() at import time and makes the redis client send AUTH
          # to the unauthenticated CI valkey service. Strip it so the host
          # tests match the no-password setup.
          sed -i '/^REDIS_PASSWORD=/d' .env
          make test-all
