name: Create and publish chap Docker image

on:
  push:
    branches: ["dev", "master"]
    tags: ["v1.*", "v2.*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/branch/sha) to build"
        required: true
      tag:
        description: "Docker image tag to publish"
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    if: github.repository == 'dhis2-chap/chap-core'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile
            image_name: dhis2-chap/chap-core
          # - dockerfile: Dockerfile.inla
          #   image_name: dhis2-chap/chap-core-with-inla
          - dockerfile: Dockerfile.worker
            image_name: dhis2-chap/chap-worker

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Docker image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "$GITHUB_REF" == "refs/heads/dev" ]]; then
            TAG="dev"
          elif [[ "$GITHUB_REF" == "refs/heads/master" ]]; then
            TAG="latest"
          else
            git fetch origin master --depth=1
            TAG_COMMIT=$(git rev-parse "$GITHUB_REF^{}")
            git merge-base --is-ancestor "$TAG_COMMIT" origin/master \
              || { echo "Tag does not point to master"; exit 1; }
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "TAGS=${{ env.REGISTRY }}/${{ matrix.image_name }}:$TAG" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build and push Docker image (amd64)
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tag.outputs.TAGS }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.image_name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.image_name }}:buildcache,mode=max
          build-args: |
            GIT_REVISION=${{ github.sha }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ matrix.image_name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
